<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telco Churn ML Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Telco Churn <span>Predictor</span></h1>
            <p>Analyze customer data in real-time leveraging machine learning</p>
        </header>

        <main class="grid-layout">
            <form id="prediction-form" class="glass-panel">
                <div class="form-section">
                    <h2><span class="icon">👤</span> Demographics</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender">
                                <option value="Female" selected>Female</option>
                                <option value="Male">Male</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="SeniorCitizen">Senior Citizen</label>
                            <select id="SeniorCitizen" name="SeniorCitizen">
                                <option value="0" selected>No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="Partner">Partner</label>
                            <select id="Partner" name="Partner">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="Dependents">Dependents</label>
                            <select id="Dependents" name="Dependents">
                                <option value="Yes">Yes</option>
                                <option value="No" selected>No</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2><span class="icon">💻</span> Services</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="PhoneService">Phone Service</label>
                            <select id="PhoneService" name="PhoneService">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="MultipleLines">Multiple Lines</label>
                            <select id="MultipleLines" name="MultipleLines">
                                <option value="Yes">Yes</option>
                                <option value="No" selected>No</option>
                                <option value="No phone service">No phone service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="InternetService">Internet Service</label>
                            <select id="InternetService" name="InternetService">
                                <option value="DSL">DSL</option>
                                <option value="Fiber optic" selected>Fiber optic</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="OnlineSecurity">Online Security</label>
                            <select id="OnlineSecurity" name="OnlineSecurity">
                                <option value="Yes">Yes</option>
                                <option value="No" selected>No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="OnlineBackup">Online Backup</label>
                            <select id="OnlineBackup" name="OnlineBackup">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="DeviceProtection">Device Protection</label>
                            <select id="DeviceProtection" name="DeviceProtection">
                                <option value="Yes">Yes</option>
                                <option value="No" selected>No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="TechSupport">Tech Support</label>
                            <select id="TechSupport" name="TechSupport">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="StreamingTV">Streaming TV</label>
                            <select id="StreamingTV" name="StreamingTV">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="StreamingMovies">Streaming Movies</label>
                            <select id="StreamingMovies" name="StreamingMovies">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2><span class="icon">💳</span> Account</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="tenure">Tenure (Months)</label>
                            <input type="number" id="tenure" name="tenure" value="24" min="0" max="100">
                        </div>
                        <div class="input-group">
                            <label for="Contract">Contract</label>
                            <select id="Contract" name="Contract">
                                <option value="Month-to-month" selected>Month-to-month</option>
                                <option value="One year">One year</option>
                                <option value="Two year">Two year</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="PaperlessBilling">Paperless Billing</label>
                            <select id="PaperlessBilling" name="PaperlessBilling">
                                <option value="Yes" selected>Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="PaymentMethod">Payment Method</label>
                            <select id="PaymentMethod" name="PaymentMethod">
                                <option value="Electronic check" selected>Electronic check</option>
                                <option value="Mailed check">Mailed check</option>
                                <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                                <option value="Credit card (automatic)">Credit card (automatic)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="MonthlyCharges">Monthly Charges ($)</label>
                            <input type="number" step="0.01" id="MonthlyCharges" name="MonthlyCharges" value="89.90">
                        </div>
                        <div class="input-group">
                            <label for="TotalCharges">Total Charges ($)</label>
                            <input type="text" id="TotalCharges" name="TotalCharges" value="2150.00">
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="predict-btn">
                    <span id="btn-text">Predict Customer Churn</span>
                    <div class="loader hidden" id="btn-loader"></div>
                </button>
            </form>

            <aside class="result-sidebar">
                <div class="glass-panel sticky-result">
                    <h2>Prediction Result</h2>
                    
                    <div id="result-container" class="result-empty">
                        <div class="pulse-icon">📊</div>
                        <p>Fill out the customer profile and hit predict to see results.</p>
                    </div>

                    <div id="result-data" class="hidden">
                        <div class="gauge-container">
                            <svg viewBox="0 0 100 50" class="gauge">
                                <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="8" stroke-linecap="round" />
                                <path id="gauge-fill" class="gauge-fill" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="8" stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="125.6" />
                            </svg>
                            <div class="gauge-value" id="prob-percentage">0%</div>
                        </div>
                        
                        <div class="status-card" id="status-card">
                            <h3 id="churn-status">Loading...</h3>
                            <p id="churn-detail">Probability of churning</p>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
